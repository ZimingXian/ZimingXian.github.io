- id: openSourceProjects
  title: 已开源项目
  items:
    - title: RoboMaster 超级电容控制器
      image: assets/images/c_supercap.png
      desc: 基于 STM32G474 的双向升降压数控电源，为 RoboMaster 机器人的超级电容系统设计。配合超级电容组，可实现机器人底盘低功耗时储能，高功耗时提供 400W+ 额外功率。<br>
        本方案
      details: 
        - 峰值电流模式内环 + 数控外环，电流环阶跃响应 20us
        - 四开关双向 BuckBoost，250kHz 开关频率 
        - 具备过流、过压、短路、通讯断联等保护，确保系统安全可靠运行
      links:
        - name: RM 论坛文章链接
          url: https://bbs.robomaster.com/article/761385
          image: assets/images/rmLogo1.png
        - name: Github 链接
          url: https://github.com/hkustenterprize/RM2025-PowerControlBoard-WirelessCharging
          icon: fab fa-github
      

