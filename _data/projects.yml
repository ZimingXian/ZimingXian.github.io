    - title: RoboMaster 无线充电系统
      images: 
        - assets/images/c_wpt_7.jpg
        - assets/images/c_wpt_5.jpg
        - assets/images/c_wpt_6.jpg
        - assets/images/c_wpt_0.jpg
        - assets/images/c_wpt_1.png
        - assets/images/c_wpt_2.jpg
        - assets/images/c_wpt_3.jpg
        - assets/images/c_wpt_4.jpg
      tags: [硬件开发, 嵌入式开发(部分), 机械结构设计]
      desc: |
        <p>基于 STM32G474 的数控无线充电系统（发射端），可以为机器人以 120W、86% 效率进行无线充电，具有强鲁棒性和稳定的通讯、保护机制。</p>
        <p>通过独特的发射端对位结构设计，使得机器人对位精准、坚固耐用、兼容性强。</p>
      details: 
        - LCC-S 拓扑，整体充电效率 86%，最大功率 120W+
        - 抗偏移能力强，80mm 线圈可承受 15mm 的水平或垂直偏移，同时效率与传输功率无明显衰减
        - 类似 Qi 协议的稳定 ASK 反向通讯，实现接收端功率闭环
        - 具备过流、超功率、通讯断联等完善的保护机制
      links:
        - name: 开源文章 (硬件/嵌入式)
          url: https://bbs.robomaster.com/article/761385
          image: assets/images/rmLogo1.png
        - name: 开源文章 (机械结构/效果展示)
          url: https://bbs.robomaster.com/article/760961
          image: assets/images/rmLogo1.png
        - name: 工程文件 (硬件/嵌入式)
          url: https://github.com/hkustenterprize/RM2025-PowerControlBoard-WirelessCharging
          icon: fab fa-github
        - name: PCB 预览 (发射端)
          url: https://kicanvas.org/?github=https%3A%2F%2Fgithub.com%2Fhkustenterprize%2FRM2025-PowerControlBoard-WirelessCharging%2Ftree%2Fmain%2FWirelessCharger_V0.1
          icon: fas fa-microchip fa-fw
        - name: PCB 预览 (接收端)
          url: https://kicanvas.org/?github=https%3A%2F%2Fgithub.com%2Fhkustenterprize%2FRM2025-PowerControlBoard-WirelessCharging%2Ftree%2Fmain%2FPowerControlBoard_RXCoil_V0.1
          icon: fas fa-microchip fa-fw

    - title: RoboMaster 超级电容组
      images: 
        - assets/images/c_caparr_0.jpg
        - assets/images/c_caparr_1.jpg
        - assets/images/c_caparr_4.jpg
        - assets/images/c_caparr_3.png
        - assets/images/c_caparr_2.jpg
        

      desc: |
        <p> 适用于 RoboMaster 机器人的高能量密度超级电容组，通过尝试电容单体的不同选型与调整排布，将电容组缩小至机器人标准结构（装甲板支架）内，大大减小了对于机器人体积的占用。</p> 
        <p> 此方案在 RoboMaster 社区获得了较高反响，目前已知有超过 20 支参赛队伍复刻。 </p> 
      tags: [硬件开发, 机械结构设计]
      details: 
        - 理论容量 1980J（3.0V34F+ 3.0V10F 10 串），峰值电流约 30A
        - 机械尺寸（包括外壳）L78mm*W44mm*H66mm
        - 具有柔性外壳防护，在恶劣工况下可以保护电容组，在 5 台机器人上稳定运行一年以上
        - 被动均衡，单体保护电压 2.95V，实际使用中满电电压为29.2V
      links:
        - name: 开源文章
          url: https://bbs.robomaster.com/article/760959?source=8
          image: assets/images/rmLogo1.png
        - name: 工程文件
          url: https://github.com/hkustenterprize/RM2025-Super-Capacitor-Array
          icon: fab fa-github
        - name: PCB 预览
          url: https://kicanvas.org/?github=https%3A%2F%2Fgithub.com%2Fhkustenterprize%2FRM2025-Super-Capacitor-Array 
          icon: fas fa-microchip fa-fw

