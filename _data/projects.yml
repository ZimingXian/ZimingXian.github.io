    - title: RoboMaster 无线充电系统
      image: assets/images/c_wpt.png
      tags: [硬件开发, 嵌入式开发(部分), 机械结构设计]
      desc: |
        <p>基于 STM32G474 的数控无线充电系统（发射端），可以为机器人以 120W、86% 效率进行无线充电，具有强鲁棒性和稳定的通讯、保护机制。</p>
        <p>通过独特的发射端对位结构设计，使得机器人对位精准、坚固耐用、兼容性强。</p>
      details: 
        - LCC-S 拓扑，整体充电效率 86%，最大功率 120W+
        - 抗偏移能力强，80mm 线圈可承受 15mm 的水平或垂直偏移，同时效率与传输功率无明显衰减
        - 类似 Qi 协议的稳定 ASK 反向通讯，实现接收端功率闭环
        - 具备过流、超功率、通讯断联等完善的保护机制
      links:
        - name: 开源文章 (硬件/嵌入式)
          url: https://bbs.robomaster.com/article/761385
          image: assets/images/rmLogo1.png
        - name: 开源文章 (机械结构/效果展示)
          url: https://bbs.robomaster.com/article/760961
          image: assets/images/rmLogo1.png
        - name: 工程文件 (硬件/嵌入式)
          url: https://github.com/hkustenterprize/RM2025-PowerControlBoard-WirelessCharging
          icon: fab fa-github
        - name: PCB 预览 (发射端)
          url: https://kicanvas.org/?github=https%3A%2F%2Fgithub.com%2Fhkustenterprize%2FRM2025-PowerControlBoard-WirelessCharging%2Ftree%2Fmain%2FWirelessCharger_V0.1
          icon: fas fa-microchip fa-fw
        - name: PCB 预览 (接收端)
