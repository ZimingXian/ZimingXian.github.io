    - title: RoboMaster 超级电容组
      images: 
        - assets/images/c_caparr_0.jpg
        - assets/images/c_caparr_1.jpg
        - assets/images/c_caparr_4.jpg
        - assets/images/c_caparr_3.png
        - assets/images/c_caparr_2.jpg
        

      desc: |
        <p> 适用于 RoboMaster 机器人的高能量密度超级电容组，通过尝试电容单体的不同选型与调整排布，将电容组缩小至机器人标准结构（装甲板支架）内，大大减小了对于机器人体积的占用。</p> 
        <p> 此方案在 RoboMaster 社区获得了较高反响，目前已知有超过 20 支参赛队伍复刻。 </p> 
      tags: [硬件开发, 机械结构设计]
      details: 
        - 理论容量 1980J（3.0V34F+ 3.0V10F 10 串），峰值电流约 30A
        - 机械尺寸（包括外壳）L78mm*W44mm*H66mm
        - 具有柔性外壳防护，在恶劣工况下可以保护电容组，在 5 台机器人上稳定运行一年以上
        - 被动均衡，单体保护电压 2.95V，实际使用中满电电压为29.2V
