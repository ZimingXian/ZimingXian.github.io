- id: openSourceProjects
  title: 已开源项目
  items:
    - title: RoboMaster 超级电容控制器
      images:
        - assets/images/c_supercap_0.png
        - assets/images/c_supercap_2.png
        - assets/images/c_supercap_3.jpg
        - assets/images/c_supercap_4.jpg
        - assets/images/c_supercap_5.jpg
        - assets/images/c_supercap_6.jpg
        - assets/images/c_supercap_15.png
        - assets/images/c_supercap_16.png
        - assets/images/c_supercap_17.png
        - assets/images/c_supercap_18.png
        - assets/images/c_supercap_10.png
        - assets/images/c_supercap_13.png
        - assets/images/c_supercap_14.png
      desc: |
        <p>基于 STM32G474 的双向升降压电源，为 RoboMaster 机器人的超级电容系统设计。配合超级电容组，可实现机器人底盘低功耗时储能，高功耗时提供 400W+ 额外功率。</p>
        <p>本方案采用双板设计，将功率部分和控制电路分离，兼顾可维护性、防干扰与空间利用率。</p>
      details: 
        - 高位采样峰值电流模式控制 + 数控外环，电流环阶跃响应 20us
        - 四开关双向 BuckBoost，250kHz 开关频率，持续电流 16A+
        - 两侧半桥具备上管常开功能，升降压模式间平滑切换
        - 体积 60x44x30mm，仅依靠被动散热可以连续、长时间运行不会过热
        - 具备过流、过压、短路、通讯断联等完善的保护机制
        - 在 5 台机器人上稳定运行一年以上，未出现故障
      tags: [硬件开发, 嵌入式开发]
      links:
        - name: 开源文章
          url: https://bbs.robomaster.com/article/761385
          image: assets/images/rmLogo1.png
        - name: 工程文件
          url: https://github.com/hkustenterprize/RM2025-PowerControlBoard-WirelessCharging
          icon: fab fa-github
