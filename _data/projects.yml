    - title: 大功率 48V 转 24V 降压模块
      images: 
        - assets/images/c_buck.jpg
        - assets/images/c_buck_1.png
      desc: |
        <p>大功率 48V 转 24V 降压模块，体积小，输出电流最大 20A，用于 RoboMaster 无人机的云台系统供电。</p>
        <p>使用独立辅助供电，大幅降低高压输入下的空载功耗。FCCM 模式允许输出电流倒灌。</p>
      tags: [硬件开发]
      details: 
        - 体积 45x22x20mm
        - 最大 20A 输出，FCCM 模式下空载功耗约 2W
        - 7.5A 负载时效率约 96.5%
