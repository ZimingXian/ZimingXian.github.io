- id: courseProjects
  title: 课设项目
  items:
    - title: 基于 FPGA 的音频处理系统
      images: 
        - assets/images/c_fpga.png
        - assets/images/c_fpga_2.jpg
      desc: |
        <p>基于 BASYS3 开发板设计，实现了具有多种滤波功能的音频处理系统，并可以通过 VGA 输出界面进行交互式控制和状态显示。</p>
        <p>该项目通过自制的 PCB 扩展版提供音频采样适配电路，使用 ADC 采样，进行数据处理后通过 I2S 协议输出给功率放大器，再输出到扬声器。</p>
      tags: [FPGA开发, 硬件开发]
      details: 
        - 5 段均衡器，可独立控制增益，通过 5 个 FIR 滤波器实现频谱分割在乘上不同增益实现
        - 高通/低通 IIR 滤波器，可动态调整截止频率，通过切换预先计算的系数组
        - 通过 VGA 输出界面，包含频谱图、不同均衡器开关、增益控制、输入输出音量等信息
        - 输出界面有半透明的背景图，并通过像素插值提升了图片的显示效果
      links:
        - name: Demo PPT
          url: assets/files/ELEC4320_Project_Demo.pdf
          icon: fa fa-file-pdf


    - title: SMT 贴片机
      image: assets/images/c_smt.jpg
      desc: |
        <p> 本项目为嵌入式课程的课设，与队友合作开发，共同实现了一套完整的 SMT 贴片机系统 </p>
        <p> 本项目通过自制步进电机 FOC 驱动板、主控板与屏幕板，并通过 CAN 总线通讯，实现了稳定、精准的位置控制 </p>
      tags: [硬件开发, 嵌入式开发(部分), 机械结构设计(部分)]
      details: 
        - 自研基于 STM32G431 的步进电机 FOC 驱动板
        - 自研基于 STM32G431 的主控板，除于电机通讯的 CAN 外，还有通过 I2S 驱动的功放、LED 灯带驱动等外设功能
        - 通过 SC8815 实现升降压充电与供电路径切换
      links:
        - name: Github 链接
          url: https://github.com/baoqi-zhong/Awesome-SMT-Machine
          icon: fab fa-github

